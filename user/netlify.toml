# Netlify configuration for iVotePK React frontend (Create React App)

[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # face-api.js models + CRA build can exceed default memory on Netlify
  NODE_OPTIONS = "--max-old-space-size=4096"
  GENERATE_SOURCEMAP = "false"
  # Netlify sets CI=true by default; CRA treats warnings as errors when CI=true
  CI = "false"
  REACT_APP_API_URL = "https://voting-4sb6.onrender.com"

# SPA fallback — React Router client-side routes (e.g. /login, /admin)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
