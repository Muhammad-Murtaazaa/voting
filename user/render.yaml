# Optional Render Blueprint — deploy via Dashboard → Blueprints → New Blueprint
# Or create the web service manually and copy build/start commands from here.

services:
  - type: web
    name: ivotepk-ai-fraud
    runtime: python
    rootDir: backend/ai_fraud_detection
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
